monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - app_errors # Erreurs 500 / imprévues (ExceptionSubscriber)
        - security_errors # 401/403/JWT (ExceptionSubscriber)
        - business_errors # AppException métier, ex: 409/422 (ExceptionSubscriber)

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                # security_errors/business_errors sont journalisés en "warning" : sous
                # fingers_crossed (action_level: error), un buffer sans ERROR+ est
                # entièrement jeté, ce qui les ferait disparaître silencieusement.
                # Ils ont donc leurs propres handlers directs ci-dessous.
                channels: ["!event", "!security_errors", "!business_errors"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            security_errors:
                type: stream
                channels: [security_errors]
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            business_errors:
                type: stream
                channels: [business_errors]
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                # Même raison qu'en test : security_errors/business_errors ne doivent
                # pas dépendre du buffer fingers_crossed pour être conservés.
                channels: ["!deprecation", "!security_errors", "!business_errors"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            security_errors:
                type: stream
                channels: [security_errors]
                path: php://stderr
                formatter: monolog.formatter.json
            business_errors:
                type: stream
                channels: [business_errors]
                path: php://stderr
                formatter: monolog.formatter.json
