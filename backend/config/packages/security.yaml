security:
    # 🔑 Provider principal : User avec email comme identifiant
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 🔒 Encodage des mots de passe
    password_hashers:
        App\Entity\User:
            algorithm: auto
            cost: 12        # coût pour bcrypt/argon2
            memory_cost: 1024 # mémoire utilisée pour argon2

    firewalls:
        # 🔒 Firewall principal (site web)
        main:
            provider: app_user_provider
            custom_authenticator: App\Security\SecurityAuthenticator
            logout:
                path: logout
                target: login
                invalidate_session: true
            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800 # 7 jours
                path: /
                always_remember_me: false
                token_provider:
                    doctrine: true
            lazy: true

        # 🔒 Firewall API (stateless)
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            custom_authenticator: App\Security\SecurityAuthenticator

    # 🔒 Hiérarchie des rôles
    # Chaîne linéaire : chaque rang hérite de tous les droits du rang précédent.
    # USER < EDITOR < MODERATOR < MANAGER < ADMIN < SUPER_ADMIN
    role_hierarchy:
        ROLE_EDITOR: [ROLE_USER]
        ROLE_MODERATOR: [ROLE_EDITOR]
        ROLE_MANAGER: [ROLE_MODERATOR]
        ROLE_ADMIN: [ROLE_MANAGER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

    # 🔒 Contrôle d'accès par rôle
    access_control:
        - { path: ^/admin, roles: ROLE_EDITOR }             # Back-office ouvert dès le rang Éditeur (le détail des actions est géré par les Voters)
        - { path: ^/projects, roles: ROLE_USER }            # Projets accessibles aux utilisateurs connectés
        - { path: ^/profile, roles: ROLE_USER }             # Profil accessible aux utilisateurs connectés
        - { path: ^/login, roles: PUBLIC_ACCESS }           # Login public
        - { path: ^/register, roles: PUBLIC_ACCESS }        # Inscription publique
        - { path: ^/verify/email, roles: PUBLIC_ACCESS }    # Vérification email publique
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }    # API protégée (auth obligatoire)
   