security:
    # 🔑 Provider principal : User avec email comme identifiant
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 🔒 Encodage des mots de passe
    password_hashers:
        App\Entity\User:
            algorithm: auto
            cost: 12
            memory_cost: 1024

    # enable_authenticator_manager: true
    firewalls:
        # 🔒 Firewall principal (site web)
        main:
            provider: app_user_provider
            custom_authenticator: App\Security\SecurityAuthenticator
            logout:
                path: logout
                target: login
                invalidate_session: true
            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800 # 7 jours
                path: /
                always_remember_me: false
            lazy: true

        # 🔒 Firewall API (stateless)
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            custom_authenticator: App\Security\SecurityAuthenticator

    # 🔒 Hiérarchie des rôles
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    # 🔒 Contrôle d'accès par rôle
    access_control:
        - { path: ^/dashboard, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/verify/email, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
