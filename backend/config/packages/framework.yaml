framework:
    secret: '%env(APP_SECRET)%'

    # Reverse proxy / load balancer : sans ceci, derrière un proxy (nginx,
    # Traefik, un CDN...), $request->getClientIp() renvoie l'IP du proxy pour
    # TOUT le monde — ce qui neutraliserait silencieusement tous les rate
    # limiters par IP (login, formulaires publics) et fausserait la géoloc des
    # connexions. Renseigner SYMFONY_TRUSTED_PROXIES en prod avec l'IP/plage du
    # proxy de confiance (ex: "10.0.0.0/8", ou "REMOTE_ADDR" si un seul proxy
    # direct). Laissé vide en local (pas de proxy) : aucune IP n'est approuvée.
    trusted_proxies: '%env(default::SYMFONY_TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    # Sessions sécurisées
    session:
        cookie_secure: auto
        cookie_samesite: strict
        cookie_httponly: true
        handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler
        # Filet de sécurité côté serveur : le timeout d'inactivité de 10 min
        # (assets/js/idle-timeout.js) est désactivable en coupant JavaScript.
        # Au-delà de 30 min sans la moindre requête, la session expire aussi
        # côté serveur (PdoSessionHandler s'appuie sur cette valeur, pas sur
        # l'ini PHP par défaut).
        gc_maxlifetime: 1800

    # Protection CSRF
    csrf_protection: true

    # Rate limiter (API abuse uniquement, login supprimé)
    rate_limiter:
        login:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        api:
            policy: sliding_window
            limit: 100
            interval: '1 minute'
        two_factor_setup:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        # Anti-bruteforce du code TOTP à la connexion (/2fa_check). Scheb ne
        # limite pas nativement les tentatives ; sans ce garde-fou, un code à
        # 6 chiffres (1 000 000 de combinaisons, fenêtre TOTP ~30-90s) resterait
        # théoriquement attaquable. Clé = identifiant utilisateur.
        two_factor_attempt:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'
        # Anti-spam des notifications admin par email (ErrorNotifier) : au plus
        # 1 email par heure et par classe d'exception. Pool dédié (cache.yaml)
        # pour pouvoir le vider isolément sans affecter les autres limiteurs.
        error_notification:
            policy: fixed_window
            limit: 1
            interval: '1 hour'
            cache_pool: cache.error_notifier
        # Anti-spam des formulaires publics non protégés jusqu'ici (contact,
        # devis, témoignage) — App\Service\PublicSubmissionThrottler.
        public_form_submission:
            policy: sliding_window
            limit: 10
            interval: '1 hour'
        # Inscription (formulaire web /register et API collaborator_registrations)
        # — plus stricte car elle déclenche un envoi d'email synchrone.
        registration_attempt:
            policy: sliding_window
            limit: 5
            interval: '1 hour'

    # HTTP cache et fragments (désactivés par défaut)
    # esi: true
    # fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
