api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

when@prod:
    api_platform:
        # Le schéma complet (champs, relations, contraintes de validation) ne
        # doit pas être exposé à un attaquant en phase de reconnaissance.
        enable_swagger_ui: false
        enable_re_doc: false
        enable_docs: false
